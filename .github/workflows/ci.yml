name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (flake8)
        run: flake8 src tests

      - name: Test (pytest)
        run: pytest --cov=xbee_gateway
